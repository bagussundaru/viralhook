version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: viralhook_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: viralhook
      POSTGRES_PASSWORD: viralhook123
      POSTGRES_DB: viralhook_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viralhook -d viralhook_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: viralhook_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://viralhook:viralhook123@db:5432/viralhook_db
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
